# tmux Desktop Configuration
# Dual status bar layout like zellij dual-bar
# Top: Session + Tabs | Bottom: Mode + Hints + Time

# =============================================================================
# Dual Status Bar Setup (tmux 3.3+)
# =============================================================================

# Enable 2 status lines
set -g status 2

# Top bar (format[0]): Session and window tabs
set -g status-format[0] "#[align=left bg=#073642 fg=#268bd2 bold] #S #[bg=#002d38]#[align=left]#[bg=#002d38]#{W:#{?window_active,#[fg=#fdf6e3 bg=#268bd2 bold] #I:#W ,#[fg=#586e75 bg=#002d38] #I:#W }}"

# Bottom bar (format[1]): Mode + Hints + Time
set -g status-format[1] "#[align=left bg=#002d38]#{?client_prefix,#[bg=#268bd2 fg=#fdf6e3 bold] PREFIX #[bg=#002d38] ,#{?pane_in_mode,#[bg=#2aa198 fg=#fdf6e3 bold] COPY #[bg=#002d38] ,#[bg=#073642 fg=#268bd2 bold] NORMAL #[bg=#002d38] }}#[align=centre fg=#586e75 bg=#002d38]M-hjkl:Pane M-n/p:Win M-1-9:Tab ?:Help#[align=right fg=#586e75 bg=#002d38] %H:%M "

# Position at bottom (line 0 appears above line 1)
set -g status-position bottom

# Clear default left/right since we use status-format
set -g status-left ""
set -g status-right ""

# =============================================================================
# Desktop-Specific Bindings
# =============================================================================

# Alt+f toggle floating (simulate with popup)
bind -n M-f display-popup -E -w 80% -h 80%

# Ctrl+d/u half-page scroll from normal mode
bind -n C-d copy-mode \; send-keys -X halfpage-down
bind -n C-u copy-mode \; send-keys -X halfpage-up

# Help popup with full keybindings
bind ? display-popup -E -w 80% -h 80% 'cat ~/github/dotfiles/tmux/tmux-hints.txt | less -R'
