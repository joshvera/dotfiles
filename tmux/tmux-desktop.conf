# tmux Desktop Configuration
# Dual status bar layout like zellij dual-bar
# Top: Session + Tabs | Bottom: Mode + Hints + Time

# =============================================================================
# Dual Status Bar Setup (tmux 3.3+)
# =============================================================================

# Enable 2 status lines
set -g status 2

# Top bar: Session name and window list
set -g status-format[0] '#[align=left,bg=#073642,fg=#268bd2,bold] #S #[fg=#268bd2,bg=#002d38]#[align=left]#{W:#[fg=#586e75,bg=#002d38] #I:#W  ,#[fg=#fdf6e3,bg=#268bd2,bold] #I:#W #[fg=#268bd2,bg=#002d38]}'

# Bottom bar: Mode indicator + Hints + DateTime
set -g status-format[1] '#[align=left]#{?client_prefix,#[bg=#268bd2 fg=#fdf6e3 bold] PREFIX ,#{?pane_in_mode,#[bg=#2aa198 fg=#fdf6e3 bold] COPY ,#[bg=#073642 fg=#268bd2 bold] NORMAL }}#[bg=#002d38] #[align=centre,fg=#586e75]F1:Pane F3:Resize F4:Move F5:Search F6:Scroll F9:Borders#[align=right,fg=#586e75,bg=#002d38] %H:%M '

# Position bottom (the dual bars stack, with format[0] on top)
set -g status-position bottom

# Override left/right (not used with status-format, but set for safety)
set -g status-left ''
set -g status-right ''

# =============================================================================
# Desktop-Specific Bindings
# =============================================================================

# Alt+f toggle floating (simulate with popup)
bind -n M-f display-popup -E -w 80% -h 80%

# Ctrl+d/u half-page scroll from normal mode
bind -n C-d copy-mode \; send-keys -X halfpage-down
bind -n C-u copy-mode \; send-keys -X halfpage-up

# Help popup with full keybindings
bind ? display-popup -E -w 80% -h 80% 'cat ~/github/dotfiles/tmux/tmux-hints.txt | less -R'
