# tmux Mobile Configuration
# Single top bar for screen real estate, popup hints on demand

# =============================================================================
# Single Status Bar - Top
# =============================================================================

set -g status 1
set -g status-position top

# Compact top bar: Session + Mode indicator + Tabs
set -g status-left '#[bg=#073642,fg=#268bd2,bold] #S #{?client_prefix,#[bg=#268bd2 fg=#fdf6e3] P ,#{?pane_in_mode,#[bg=#2aa198 fg=#fdf6e3] C ,}}#[bg=#002d38,fg=#073642]'
set -g status-left-length 30

# Minimal right: just time
set -g status-right '#[fg=#586e75] %H:%M '
set -g status-right-length 10

# Compact window format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#fdf6e3,bg=#268bd2,bold] #I:#W '

# =============================================================================
# Mobile-Specific: Popup Hints (since no bottom bar)
# =============================================================================

# ? shows full keybinding cheatsheet in popup
bind ? display-popup -E -w 90% -h 80% 'cat ~/github/dotfiles/tmux/tmux-hints.txt | less -R'

# F10 also shows hints (easier on some mobile keyboards)
bind -n F10 display-popup -E -w 90% -h 80% 'cat ~/github/dotfiles/tmux/tmux-hints.txt | less -R'

# =============================================================================
# Mobile-Specific: Disable Conflicting Ctrl Bindings
# =============================================================================
# Touch keyboards often trigger Ctrl accidentally, so we avoid some bindings
# that could cause issues. Keep PageUp/PageDown and F-keys which work well.

# Unbind Ctrl+d/u from normal mode (keep in copy-mode only)
unbind -n C-d
unbind -n C-u
