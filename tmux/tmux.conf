# tmux configuration - Zellij-inspired UX
# Base config shared between desktop and mobile
# Device-specific overrides loaded via `t` wrapper script

# =============================================================================
# Core Settings
# =============================================================================

# Enable mouse support
set -g mouse on

# Massive scrollback buffer
set -g history-limit 50000

# 256 colors + true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for better responsiveness
set -sg escape-time 10

# Enable focus events for vim/neovim
set -g focus-events on

# Better resizing
setw -g aggressive-resize on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring (visual only, no bell)
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# =============================================================================
# Clipboard & OSC 52 (for mosh)
# =============================================================================

set -g set-clipboard on
set -ga terminal-overrides ',xterm*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -ga terminal-overrides ',screen*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -ga terminal-overrides ',tmux*:XT:Ms=\E]52;%p1%s;%p2%s\007'

# Keep SSH agent forwarding working across sessions
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION"

# =============================================================================
# Oksolar Dark Theme
# =============================================================================
# Ported from zellij oksolar_dark theme
# base03  #002d38  (bg)
# base0   #98a8a8  (fg)
# base01  #586e75  (inactive/dim)
# blue    #268bd2  (accent)
# cyan    #2aa198  (search/copy)
# yellow  #b58900  (resize/move)
# red     #dc322f  (locked/alert)
# orange  #cb4b16  (tab mode)

# Pane borders
set -g pane-border-style 'fg=#586e75'
set -g pane-active-border-style 'fg=#268bd2'

# Message/command line
set -g message-style 'fg=#fdf6e3,bg=#268bd2,bold'

# =============================================================================
# Prefix Key - Ctrl-Space (ergonomic, vim-friendly)
# =============================================================================

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix  # Ctrl-Space twice sends literal Ctrl-Space

# =============================================================================
# Key Bindings - Shared
# =============================================================================

# Preserve current path when creating new windows/panes
bind c new-window -c "#{pane_current_path}"

# Intuitive splits (- horizontal, | vertical) - easier to remember than % and "
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"  # Keep old binding too
bind '"' split-window -v -c "#{pane_current_path}"

# Reload config (moved to Shift+R to free up 'r' for rename)
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Intuitive rename bindings (r for window, Ctrl-r for session)
bind r command-prompt -I "#W" "rename-window '%%'"
bind C-r command-prompt -I "#S" "rename-session '%%'"

# =============================================================================
# Alt-Based Navigation (NO PREFIX - instant access)
# =============================================================================

# Pane navigation with Alt-hjkl (vim-style, no prefix needed)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane resize with Alt-HJKL (no prefix needed)
bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2

# Window navigation (browser-style Alt-number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Next/previous window with Alt-n/p
bind -n M-n next-window
bind -n M-p previous-window

# New window with Alt-c (no prefix)
bind -n M-c new-window -c "#{pane_current_path}"

# Quick splits with Alt (no prefix)
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# =============================================================================
# F-Key Mode Switching (like zellij)
# =============================================================================

# F1 - Pane selection (display pane numbers, select with number key)
bind -n F1 display-panes -d 0

# F3 - Resize mode (enter resize key table)
bind -n F3 switch-client -T resize

# F4 - Move/swap mode (enter move key table)
bind -n F4 switch-client -T move

# F5 - Search mode (enter copy mode and start search)
bind -n F5 copy-mode \; send-keys /

# F6 - Scroll/copy mode
bind -n F6 copy-mode

# F9 - Toggle pane borders
bind -n F9 set pane-border-status

# =============================================================================
# Resize Mode (F3)
# =============================================================================

bind -T resize h resize-pane -L 5 \; switch-client -T resize
bind -T resize j resize-pane -D 5 \; switch-client -T resize
bind -T resize k resize-pane -U 5 \; switch-client -T resize
bind -T resize l resize-pane -R 5 \; switch-client -T resize
bind -T resize H resize-pane -L 1 \; switch-client -T resize
bind -T resize J resize-pane -D 1 \; switch-client -T resize
bind -T resize K resize-pane -U 1 \; switch-client -T resize
bind -T resize L resize-pane -R 1 \; switch-client -T resize
bind -T resize Left resize-pane -L 5 \; switch-client -T resize
bind -T resize Down resize-pane -D 5 \; switch-client -T resize
bind -T resize Up resize-pane -U 5 \; switch-client -T resize
bind -T resize Right resize-pane -R 5 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize Enter switch-client -T root
bind -T resize q switch-client -T root

# =============================================================================
# Move Mode (F4)
# =============================================================================

bind -T move h select-pane -L \; switch-client -T move
bind -T move j select-pane -D \; switch-client -T move
bind -T move k select-pane -U \; switch-client -T move
bind -T move l select-pane -R \; switch-client -T move
bind -T move H swap-pane -U \; switch-client -T move
bind -T move J swap-pane -D \; switch-client -T move
bind -T move K swap-pane -U \; switch-client -T move
bind -T move L swap-pane -D \; switch-client -T move
bind -T move Left select-pane -L \; switch-client -T move
bind -T move Down select-pane -D \; switch-client -T move
bind -T move Up select-pane -U \; switch-client -T move
bind -T move Right select-pane -R \; switch-client -T move
bind -T move Escape switch-client -T root
bind -T move Enter switch-client -T root
bind -T move q switch-client -T root

# =============================================================================
# Copy/Scroll Mode - Vim + Emacs Bindings
# =============================================================================

setw -g mode-keys vi

# Enter copy mode with PageUp (like zellij)
bind -n PageUp copy-mode -u
bind -n PageDown copy-mode \; send-keys -X page-down

# Vim-style selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Vim scroll bindings
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

# Emacs scroll bindings
bind -T copy-mode-vi C-v send-keys -X page-down
bind -T copy-mode-vi M-v send-keys -X page-up

# PageUp/PageDown in copy mode
bind -T copy-mode-vi PageUp send-keys -X page-up
bind -T copy-mode-vi PageDown send-keys -X page-down

# Search
bind -T copy-mode-vi / send-keys -X search-forward
bind -T copy-mode-vi ? send-keys -X search-backward
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

# Exit copy mode
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel

# =============================================================================
# Status Bar - Base (overridden by device-specific configs)
# =============================================================================

set -g status on
set -g status-interval 5
set -g status-position bottom

# Oksolar colors
set -g status-style 'bg=#002d38,fg=#98a8a8'
set -g status-left-length 50
set -g status-right-length 80

# Window status - oksolar styling
setw -g window-status-style 'fg=#586e75,bg=#002d38'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-style 'fg=#fdf6e3,bg=#268bd2,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-activity-style 'fg=#b58900,bg=#002d38'

# =============================================================================
# Load Device-Specific Config
# =============================================================================
# The `t` wrapper script sets TMUX_DEVICE_TYPE and sources the appropriate
# override config. If running tmux directly, default to desktop behavior.

if-shell '[ "$TMUX_DEVICE_TYPE" = "mobile" ]' \
    'source-file ~/github/dotfiles/tmux/tmux-mobile.conf' \
    'source-file ~/github/dotfiles/tmux/tmux-desktop.conf'
