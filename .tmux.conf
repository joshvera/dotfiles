# AI Hypervisor tmux configuration
# Optimized for mosh+iOS connectivity with Termius

# Enable mouse support for touch scrolling on iOS
set -g mouse on

# Set massive scrollback buffer (50k lines)
set -g history-limit 50000

# Use 256 colors to prevent rendering issues
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable OSC 52 clipboard support for mosh
# This allows clipboard operations over mosh connections
set -g set-clipboard on
set -ga terminal-overrides ',xterm*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -ga terminal-overrides ',screen*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -ga terminal-overrides ',tmux*:XT:Ms=\E]52;%p1%s;%p2%s\007'

# Status bar configuration
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style 'bg=colour235 fg=colour137'
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[bg=colour235] '
set -g status-right '#[fg=colour233,bg=colour241,bold] %H:%M:%S #[fg=colour233,bg=colour245,bold] #H '
set -g status-left-length 50
set -g status-right-length 50

# Window status
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=colour138 bg=colour235'
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Reduce escape time for better responsiveness
set -sg escape-time 10

# Enable focus events for vim/neovim
set -g focus-events on

# Better resizing
setw -g aggressive-resize on

# Preserve current path when creating new windows/panes
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Reload config shortcut
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Clear scrollback buffer
bind -n C-k clear-history

# Copy mode with vi bindings
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Volume button scrolling - match Zellij behavior
# PageUp/PageDown automatically enter copy mode and scroll
bind-key -n PageUp copy-mode -u
bind-key -n PageDown copy-mode \; send-keys -X page-down

# Backup scrolling like Zellij (Ctrl+B/Ctrl+F work in Zellij)
bind-key -n C-b copy-mode -u
bind-key -n C-f copy-mode \; send-keys -X page-down

# In copy mode, PageUp/PageDown do page scrolling
bind-key -T copy-mode-vi PageUp send-keys -X page-up
bind-key -T copy-mode-vi PageDown send-keys -X page-down
bind-key -T copy-mode-vi C-b send-keys -X page-up
bind-key -T copy-mode-vi C-f send-keys -X page-down

# Mosh-specific optimizations
# Disable visual bell to prevent rendering issues
set -g visual-bell off
set -g bell-action none

# Keep SSH agent forwarding working across tmux sessions
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION"